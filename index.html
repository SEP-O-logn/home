<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>O(logn)</title>
    <style>
      @font-face {
        font-family: "Space Grotesk Local";
        src: url("assets/fonts/SpaceGrotesk-Variable.ttf") format("truetype");
        font-weight: 300 700;
        font-style: normal;
        font-display: swap;
      }

      :root {
        --bg-top: #f8fafc;
        --bg-bottom: #edf4ff;
        --text: #0f172a;
        --muted: #334155;
        --accent: #0ea5e9;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        background: linear-gradient(180deg, var(--bg-top) 0%, var(--bg-bottom) 100%);
        color: var(--text);
        font-family: "Segoe UI", "Noto Sans", Arial, sans-serif;
      }

      main {
        text-align: center;
        max-width: 940px;
      }

      h1 {
        margin: 0;
        font-family: "Space Grotesk Local", "Segoe UI", "Noto Sans", Arial, sans-serif;
        font-size: clamp(2.4rem, 8vw, 5.4rem);
        line-height: 1.05;
        letter-spacing: -0.03em;
        font-weight: 700;
      }

      p {
        margin: 1rem 0 0;
        font-size: clamp(0.98rem, 2.2vw, 1.22rem);
        line-height: 1.5;
        color: var(--muted);
      }

      a {
        color: var(--accent);
        text-decoration-thickness: 2px;
        text-underline-offset: 3px;
      }

      .separator {
        color: #64748b;
        margin: 0 0.4rem;
      }

      a:hover,
      a:focus-visible {
        color: #0284c7;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Willkommen auf der Website von O(logn) 👋</h1>
      <p>
        Diese Seite befindet sich noch im Aufbau. <br>
        <a href="https://moodle.hs-mannheim.de/mod/wiki/view.php?pageid=3283" target="_blank" rel="noopener noreferrer">Hier geht's zu unserer Moodle-Seite.</a>
        <span class="separator" aria-hidden="true">|</span>
        <a href="https://www.hs-mannheim.de/impressum.html">Impressum</a>.
      </p>
    </main>
  </body>
</html>
